<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Viewer — AER 2.0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; color: #000; background: #F2F2F2;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D8D8D8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #BBBBBB; }
    table { border-collapse: collapse; }
    th, td { font-family: 'DM Sans', sans-serif; }
    input, button, select { font-family: 'DM Sans', sans-serif; font-size: 14px; }
    mark { background: #ECEDFF; color: #4547FF; border-radius: 2px; padding: 0 1px; }
    :root { --dv-accent: #4547FF; --dv-accent-bg: #ECEDFF; --dv-accent-dark: #3638CC; }
    button:focus { outline: none; }
    select:focus { outline: none; }
    input:focus  { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="react-prod.js"></script>
  <script src="react-dom-prod.js"></script>
  <script src="dv-data.js"></script>
  <script src="dv-compiled.js"></script>
</body>
</html>
